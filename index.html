<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kala Kamna - Premium Collection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <img src="images/logo.png" alt="Logo" class="splash-logo">
        </div>
    </div>

    <!-- TOP NAVIGATION BAR -->
    <nav class="top-nav">
        <!-- Monogram/Logo on Left -->
        <div class="logo-left" id="logoHome">
            <img src="images/monogram.png" alt="Kala Kamna Monogram" class="logo-image">
        </div>

        <!-- Icons on Right -->
        <div class="nav-icons">
            <!-- Cart Icon -->
            <div class="nav-icon-container">
                <button class="nav-icon-btn" id="cartBtn" title="Shopping Cart">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="icon-svg">
                        <path d="M7 4V3c0-.55-.45-1-1-1s-1 .45-1 1v1H2c-1.1 0-1.99.9-1.99 2L0 19c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-3V3c0-.55-.45-1-1-1s-1 .45-1 1v1H7zm13 2v10H4V6h16z" fill="currentColor"/>
                    </svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
                <span class="icon-label">Cart</span>
            </div>

            <!-- Account Icon -->
            <div class="nav-icon-container" style="position: relative;">
                <button class="nav-icon-btn" id="accountBtn" title="Account">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="icon-svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/>
                    </svg>
                </button>
                <span class="icon-label">Account</span>
                <div class="account-dropdown" id="accountDropdown">
                    <div class="account-item">Orders</div>
                    <div class="account-item">Contact Us</div>
                    <div class="account-item">Terms of Service</div>
                    <div class="account-item">Privacy Policy</div>
                    <div class="account-item">FAQ</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- CART PANEL -->
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <button class="close-btn" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">Your cart is empty</div>
        </div>
        <div class="cart-total" id="cartTotalSection" style="display: none;">
            <div class="cart-total-label">Total:</div>
            <div class="cart-total-amount" id="cartTotal">$0.00</div>
        </div>
        <button class="checkout-btn" id="checkoutBtn" style="display: none;">Checkout</button>
    </div>

    <!-- CATEGORIES PAGE -->
    <div class="categories-page" id="categoriesPage">
        <h1 class="page-title">Explore Our Collections</h1>
        <div class="categories-container">
            <div class="categories-grid" id="categoriesGrid">
                <!-- Categories will be loaded here -->
            </div>
        </div>
    </div>

    <!-- PRODUCTS PAGE -->
    <div class="products-page hidden" id="productsPage">
        <div class="products-header">
            <button class="back-btn" id="backBtn">← Back to Categories</button>
            <h1 class="products-title" id="categoryTitle">Products</h1>
        </div>

        <div class="products-page-wrapper">
            <!-- FILTER SIDEBAR -->
            <aside class="filter-sidebar" id="filterSidebar">
                <div class="filter-title">Filters</div>

                <!-- Size Filter -->
                <div class="filter-group">
                    <div class="filter-group-title" onclick="toggleFilter(this)">
                        Size
                        <span class="filter-toggle">▶</span>
                    </div>
                    <div class="filter-options">
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="size" value="Small">
                            <span class="filter-label">Small (8x10)</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="size" value="Medium">
                            <span class="filter-label">Medium (12x16)</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="size" value="Large">
                            <span class="filter-label">Large (18x24)</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="size" value="Extra Large">
                            <span class="filter-label">Extra Large (24x36)</span>
                        </label>
                    </div>
                </div>

                <!-- Price Filter -->
                <div class="filter-group">
                    <div class="filter-group-title" onclick="toggleFilter(this)">
                        Price Range
                        <span class="filter-toggle">▶</span>
                    </div>
                    <div class="filter-options">
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="price" value="0-30">
                            <span class="filter-label">Under $30</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="price" value="30-60">
                            <span class="filter-label">$30 - $60</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="price" value="60-100">
                            <span class="filter-label">$60 - $100</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="price" value="100+">
                            <span class="filter-label">$100+</span>
                        </label>
                    </div>
                </div>

                <!-- Color Theme Filter -->
                <div class="filter-group">
                    <div class="filter-group-title" onclick="toggleFilter(this)">
                        Color Theme
                        <span class="filter-toggle">▶</span>
                    </div>
                    <div class="filter-options">
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="color" value="Warm">
                            <span class="filter-label">Warm Tones</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="color" value="Cool">
                            <span class="filter-label">Cool Tones</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="color" value="Vibrant">
                            <span class="filter-label">Vibrant Colors</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="color" value="Neutral">
                            <span class="filter-label">Neutral Palette</span>
                        </label>
                    </div>
                </div>

                <!-- Product Type Filter -->
                <div class="filter-group">
                    <div class="filter-group-title" onclick="toggleFilter(this)">
                        Product Type
                        <span class="filter-toggle">▶</span>
                    </div>
                    <div class="filter-options">
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="type" value="Painting">
                            <span class="filter-label">Painting</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="type" value="Sculpture">
                            <span class="filter-label">Sculpture</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="type" value="Resin Art">
                            <span class="filter-label">Resin Art</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="filter-checkbox" data-filter="type" value="Digital Print">
                            <span class="filter-label">Digital Print</span>
                        </label>
                    </div>
                </div>

                <button class="clear-filters-btn" onclick="clearFilters()">Clear All Filters</button>
            </aside>

            <!-- PRODUCTS GRID -->
            <div class="products-container">
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
